name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'freerec/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchdata==0.7.0 --no-deps
          pip install -r docs/requirements.txt
          pip install sphinx-intl
          pip install -e .

      - name: Build Chinese docs
        run: sphinx-build docs docs/_build/html/zh -b html --keep-going

      - name: Build English docs
        run: sphinx-build -D language=en docs docs/_build/html/en -b html --keep-going

      - name: Create root redirect
        run: |
          echo '<html><head><meta http-equiv="refresh" content="0;url=zh/"></head></html>' > docs/_build/html/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
